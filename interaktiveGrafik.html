@media(max-width:600px){.header h1{font-size:20px}.timeline-area{padding-left:140px}.person-label{font-size:9px}.detail-panel{width:100vw}}
</style>

  {name:"Fina Fitz",born:1910,died:null,cat:"erfinden",desc:"Miterfinderin des Dufthalters und Tropfenfängers. Inhaberin einer Agentur in der Mitteldorfgasse.",events:[{y:1932,t:"Patent gemeinsam mit Mia Oberhauser"}]},
  {name:"Ida Wipplinger",born:1911,died:1993,geb:"Schwendinger",cat:"unternehmen",desc:"Jüngste Hebamme Österreichs (1931). Pionierin sanfter Geburtsmethoden: Atemtechnik, freie Gebärposition, Väter im Kreißsaal.",events:[{y:1931,t:"Jüngste Hebamme Österreichs"},{y:1934,t:"Eröffnung Entbindungsheim mit Mutter"},{y:1937,t:"Dornbirner Stadthebamme"}]},
  {name:"Elsa Himmer",born:1914,died:1988,cat:"widerstand",desc:"12 Jahre Zuchthaus wegen \"Hochverrat\". Ihr Mann wurde hingerichtet. Kinder ins Waisenhaus. Musste in der Rüstungsindustrie Gasmasken herstellen.",events:[{y:1940,t:"Verhaftung durch die Gestapo (eigener Stiefbruder)"},{y:1942,t:"12 Jahre Zuchthaus – Ehemann hingerichtet"},{y:1944,t:"Zwangsarbeit in der Baumwollspinnerei Kolbermoor"},{y:1945,t:"Befreiung durch US-Truppen"}]},
  {name:"Hedwig Thurnher",born:1915,died:2001,geb:"Mäser",cat:"unternehmen",desc:"Persönlich haftende Gesellschafterin der Firma Mäser-Elastisana. Garantin für Qualität. Im Gewerberegister nur als \"Geschäftsführersgattin\" geführt.",events:[{y:1933,t:"Heirat mit Dr. Manfred Thurnher"},{y:1969,t:"Alleinige Firmenleitung nach Tod des Gatten"}]},
  {name:"Herta-Maria Witzemann",born:1918,died:1999,cat:"kunst",desc:"Weltweit bekannte Innenarchitektin. Jüngste Professorin Stuttgarts (1951). Großes Bundesverdienstkreuz. Ihre Möbel werden noch heute verkauft.",events:[{y:1948,t:"Selbstständige Innenarchitektin"},{y:1951,t:"Jüngste Professorin an der Stuttgarter Akademie"},{y:1972,t:"Präsidentin des Bundesverbandes"},{y:1993,t:"Großes Deutsches Bundesverdienstkreuz"}]}
];

const historicalMarkers = [
  {y:1774,label:"Schulpflicht (Maria Theresia)"},
  {y:1848,label:"Revolution 1848"},
  {y:1869,label:"Reichsvolksschulgesetz"},
  {y:1897,label:"Frauen an Uni zugelassen"},
  {y:1914,label:"1. Weltkrieg beginnt"},
  {y:1918,label:"Frauenwahlrecht"},
  {y:1933,label:"NSDAP-Verbot in Ö"},
  {y:1938,label:"\"Anschluss\""},
  {y:1945,label:"Kriegsende"}
];

const YEAR_MIN=1770, YEAR_MAX=2005, YEAR_SPAN=YEAR_MAX-YEAR_MIN;
const ROW_H=36, HEADER=80;
let selectedCat=null;

function yearToPercent(y){return((y-YEAR_MIN)/YEAR_SPAN)*100}

function render(){
  let filtered=selectedCat?women.filter(w=>w.cat===selectedCat):women;
  filtered.sort((a,b)=>a.born-b.born);
  
  document.getElementById('subtitle').textContent=filtered.length+' Frauen · 1770–2005 · Lebenslinien nach Geburtsjahr sortiert';
  
  // Filters
  let fhtml='<button class="cat-btn '+(selectedCat===null?'active':'')+'" onclick="selectCat(null)">Alle</button>';
  for(let[key,val]of Object.entries(CATEGORIES)){
    let style=selectedCat===key?'':'style="border-left:3px solid '+val.color+'"';
    fhtml+='<button class="cat-btn '+(selectedCat===key?'active':'')+'" '+style+' onclick="selectCat(\''+key+'\')">'+val.label+'</button>';
  }
  document.getElementById('filters').innerHTML=fhtml;
  
  let totalH=HEADER+filtered.length*ROW_H+60;
  let tl=document.getElementById('timeline');
  let html='<div style="position:relative;height:'+totalH+'px">';
  
  // Decade grid
  for(let d=YEAR_MIN;d<=YEAR_MAX;d+=10){
    let pct=yearToPercent(d);
    html+='<div class="grid-line" style="left:'+pct+'%"></div>';
    html+='<div class="year-label" style="left:'+pct+'%">'+d+'</div>';
  }
  
  // Historical markers
  for(let m of historicalMarkers){
    let pct=yearToPercent(m.y);
    html+='<div class="hist-marker" style="left:'+pct+'%"></div>';
    html+='<div class="hist-label" style="left:'+pct+'%">'+m.label+'</div>';
  }
  
  // Person rows
  filtered.forEach((p,idx)=>{
    let endYear=p.died||(p.born<1920?p.born+60:2000);
    let startPct=yearToPercent(p.born);
    let endPct=yearToPercent(endYear);
    let cat=CATEGORIES[p.cat];
    let top=HEADER+idx*ROW_H;
    
    let eventsHtml='';
    for(let ev of p.events){
      let evPct=((ev.y-p.born)/(endYear-p.born))*100;
      eventsHtml+='<div class="event-dot" style="left:'+evPct+'%;color:'+cat.color+'" data-tip="'+ev.y+': '+ev.t.replace(/"/g,'&quot;')+'"></div>';
    }
    if(!p.died) eventsHtml+='<div class="arrow" style="color:'+cat.color+'">→</div>';
    
    html+='<div class="person-row" style="top:'+top+'px">';
    html+='<div class="life-bar" data-idx="'+idx+'" style="left:'+startPct+'%;width:'+(endPct-startPct)+'%;background:linear-gradient(135deg,'+cat.color+','+cat.color+'dd)"';
    html+=' onmouseenter="barHover(this,true)" onmouseleave="barHover(this,false)" onclick="showDetail('+idx+')">';
    html+='<span class="person-label">'+p.name+'</span>';
    html+=eventsHtml;
    html+='</div></div>';
  });
  
  html+='</div>';
  tl.innerHTML=html;
  
  // Legend
  let lhtml='<span class="legend-title">Legende</span>';
  for(let[key,val]of Object.entries(CATEGORIES)){
    lhtml+='<div class="legend-item"><div class="legend-swatch" style="background:'+val.color+'"></div><span class="legend-text">'+val.label+'</span></div>';
  }
  lhtml+='<div class="legend-item" style="margin-left:8px"><div style="width:6px;height:6px;border-radius:50%;background:#fff;border:1.5px solid #888"></div><span class="legend-text">Schlüsselereignis (hover)</span></div>';
  document.getElementById('legend').innerHTML=lhtml;
  
  // Store filtered for detail access
  window._filtered=filtered;
}

function selectCat(cat){selectedCat=(selectedCat===cat)?null:cat;render()}

function barHover(el,on){
  if(on)el.classList.add('highlight');else el.classList.remove('highlight');
  let tip=document.getElementById('tooltip');
  if(on){
    let idx=parseInt(el.dataset.idx);
    let p=window._filtered[idx];
    tip.innerHTML='<b>'+p.name+'</b><br>'+p.born+' – '+(p.died||'?')+'<br><i>'+CATEGORIES[p.cat].label+'</i>';
    tip.style.display='block';
    el.addEventListener('mousemove',moveTooltip);
  }else{
    tip.style.display='none';
    el.removeEventListener('mousemove',moveTooltip);
  }
}

function moveTooltip(e){
  let tip=document.getElementById('tooltip');
  tip.style.left=(e.clientX+12)+'px';
  tip.style.top=(e.clientY-40)+'px';
}

function showDetail(idx){
  let p=window._filtered[idx];
  let cat=CATEGORIES[p.cat];
  let overlay=document.getElementById('detailOverlay');
  let panel=document.getElementById('detailPanel');
  
  let html='<button class="detail-close" onclick="closeDetail()">×</button>';
  html+='<div class="detail-cat" style="background:'+cat.bg+';color:'+cat.color+'">'+cat.label+'</div>';
  html+='<div class="detail-name">'+p.name+'</div>';
  if(p.geb) html+='<div class="detail-geb">geb. '+p.geb+'</div>';
  html+='<div class="detail-years">'+p.born+' – '+(p.died||'?')+'</div>';
  html+='<p class="detail-desc">'+p.desc+'</p>';
  if(p.events.length>0){
    html+='<div class="detail-events-title">Schlüsselmomente</div>';
    for(let ev of p.events){
      html+='<div class="detail-event"><div class="detail-event-year" style="color:'+cat.color+'">'+ev.y+'</div><div class="detail-event-text">'+ev.t+'</div></div>';
    }
  }
  
  panel.innerHTML=html;
  panel.style.display='block';
  overlay.style.display='block';
}

function closeDetail(){
  document.getElementById('detailPanel').style.display='none';
  document.getElementById('detailOverlay').style.display='none';
}

document.getElementById('detailOverlay').onclick=closeDetail;

render();
</script>
</body>
</html>
